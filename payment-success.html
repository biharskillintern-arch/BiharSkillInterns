<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - Bihar Skill Intern</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #111827;
        }

        .box {
            width: min(420px, calc(100% - 32px));
            background: white;
            border-radius: 10px;
            padding: 28px;
            text-align: center;
            box-shadow: 0 12px 35px rgba(15, 23, 42, 0.14);
        }

        .icon {
            font-size: 44px;
            margin-bottom: 12px;
        }

        h1 {
            margin: 0 0 10px;
            color: #059669;
        }

        p {
            margin: 0 0 22px;
            color: #4b5563;
        }

        a {
            display: inline-block;
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 11px 18px;
            border-radius: 6px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon">✓</div>
        <h1>Payment Successful</h1>
        <p>Your payment has been recorded. You can now continue to login.</p>
        <a href="login.html">Continue to Login</a>
    </div>

    <script>
        localStorage.setItem('paymentStatus', 'completed');
        localStorage.setItem('paymentDate', new Date().toLocaleString());
        localStorage.setItem('paymentAmount', '299');
        localStorage.setItem('paymentMethod', 'razorpay');
        localStorage.setItem('isRegistrationComplete', 'true');
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('registrationDate', new Date().toISOString());
    </script>
</body>
</html>
